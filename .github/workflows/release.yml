name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write   # tag/release e push do @semantic-release/git
  issues: write    # criar issue quando o release falhar (@semantic-release/github)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # NPM_TOKEN: crie em GitHub → Settings → Secrets → Actions (token npm com "Automation" ou "Publish")
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
