name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write   # tag/release e push do @semantic-release/git
  issues: write    # criar issue quando o release falhar (@semantic-release/github)

jobs:
  release:
    runs-on: ubuntu-latest
    # Usa o environment onde você configurou o NPM_TOKEN (Environment secrets)
    environment: NPM_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Para main protegida com "Require PR": adicione secret GH_PAT (PAT da sua conta admin).
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
